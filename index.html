<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bulk Order Manifest Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1EFEA;
    --ink:#1C2536;
    --ink-soft:#5B6373;
    --red:#D5291C;
    --red-dark:#A31F15;
    --edit-blue:#1D5FA8;
    --edit-blue-dark:#124A87;
    --stamp-green:#2F6B4F;
    --line:#D8D2C4;
    --card:#FFFFFF;
    --placeholder:#B7B2A6;
    --focus-bg:#EAF3FC;
    --error-bg:#FBE9E7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(28,37,54,0.05) 1px, transparent 0);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:17px;
    line-height:1.5;
    min-height:100vh;
    padding:32px 20px 120px;
  }
  .wrap{max-width:1000px;margin:0 auto;width:100%;}

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    border-bottom:3px solid var(--ink);
    padding-bottom:18px;
    margin-bottom:32px;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--red);
    margin:0 0 6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:36px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.5px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:26px;
    margin-bottom:24px;
    box-shadow:0 1px 0 rgba(28,37,54,0.04);
  }
  .card h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:17px;
    letter-spacing:1px;
    text-transform:uppercase;
    margin:0 0 18px;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .card h2 .n{
    font-family:'IBM Plex Mono',monospace;
    background:var(--ink);
    color:#fff;
    font-size:13px;
    width:26px;height:26px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* Sender picker */
  .step-label{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.8px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 10px;
  }
  .senders{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
  .sender-btn{
    position:relative;
    border:2px solid var(--line);
    background:#fff;
    border-radius:6px;
    padding:14px 16px;
    cursor:pointer;
    transition:.12s;
    text-align:left;
  }
  .sender-btn:hover{border-color:var(--ink);}
  .sender-btn.active{
    border-color:var(--red);
    background:#FDF1EF;
  }
  .sender-btn.locked{
    opacity:0.45;
    cursor:not-allowed;
  }
  .sender-btn.locked:hover{border-color:var(--line);}
  .sender-btn .lbl{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:17px;
    padding-right:56px;
  }
  .sender-btn .dims{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:6px;
    line-height:1.6;
  }
  .sender-edit{
    position:absolute;
    top:10px;
    right:10px;
    background:none;
    border:none;
    cursor:pointer;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--edit-blue);
    padding:4px 6px;
  }
  .sender-edit:hover{color:var(--edit-blue-dark);text-decoration:underline;}

  .req{color:var(--red);}

  .paste-box{
    background:#FAF8F3;
    border:1.5px dashed var(--line);
    border-radius:6px;
    padding:18px;
    margin-bottom:22px;
  }
  .paste-box label{
    margin-bottom:8px;
  }
  .paste-hint{
    text-transform:none;
    font-weight:400;
    color:var(--ink-soft);
    font-size:13px;
  }
  .paste-box textarea{
    min-height:100px;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
  }
  .paste-box .addbar{margin-top:12px;}

  .category-tabs{display:flex;gap:10px;margin-bottom:16px;}
  .cat-btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    background:#fff;
    border:2px solid var(--line);
    border-radius:22px;
    padding:10px 22px;
    cursor:pointer;
    color:var(--ink-soft);
    transition:.12s;
  }
  .cat-btn:hover{border-color:var(--ink);color:var(--ink);}
  .cat-btn.active{background:var(--ink);border-color:var(--ink);color:#fff;}

  .phone-row{display:flex;gap:8px;}
  .code-select{
    border:1.5px solid var(--line);
    border-radius:4px;
    padding:11px 6px;
    font-size:15px;
    font-family:'IBM Plex Mono',monospace;
    background:#FCFBF9;
    color:var(--ink);
    flex:0 0 100px;
  }
  .phone-row input{flex:1;}

  /* Product picker */
  .sizes{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;}
  #dehuPicker{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .size-btn{
    border:2px solid var(--line);
    background:#fff;
    border-radius:6px;
    padding:14px 10px;
    text-align:center;
    cursor:pointer;
    transition:.12s;
    font-family:'Inter',sans-serif;
  }
  .size-btn:hover{border-color:var(--ink);}
  .size-btn.active{
    border-color:var(--red);
    background:#FDF1EF;
  }
  .size-btn .lbl{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:19px;
  }
  .size-btn .dims{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:5px;
    line-height:1.6;
  }
  .size-btn .val{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--stamp-green);
    margin-top:4px;
    font-weight:600;
  }

  /* Form */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid .full{grid-column:1/-1;}
  label{
    display:block;
    font-size:14px;
    letter-spacing:0.2px;
    color:var(--ink);
    margin-bottom:6px;
    font-weight:600;
  }
  input, textarea{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:4px;
    padding:12px 14px;
    font-size:16px;
    font-family:'Inter',sans-serif;
    background:#FCFBF9;
    color:var(--ink);
  }
  input::placeholder, textarea::placeholder{
    color:var(--placeholder);
    font-weight:400;
  }
  input:focus, textarea:focus{
    outline:none;
    border-color:var(--edit-blue);
    background:var(--focus-bg);
  }
  input.input-error, textarea.input-error{
    border-color:var(--red);
    background:var(--error-bg);
  }
  input.input-error:focus, textarea.input-error:focus{
    border-color:var(--red);
    background:var(--error-bg);
  }
  @keyframes blinkRed{
    0%, 100% { background:var(--error-bg); border-color:var(--red); box-shadow:0 0 0 3px rgba(213,41,28,0.25); }
    50% { background:#fff; border-color:var(--line); box-shadow:none; }
  }
  input.input-blink, textarea.input-blink{
    animation:blinkRed 0.35s ease-in-out 4;
  }
  @keyframes blinkCard{
    0%, 100% { border-color:var(--red); box-shadow:0 0 0 3px rgba(213,41,28,0.2); }
    50% { border-color:var(--line); box-shadow:none; }
  }
  .card.card-blink{
    animation:blinkCard 0.35s ease-in-out 4;
  }
  textarea{resize:vertical;min-height:52px;}
  .field{margin-bottom:0;}

  .addbar{
    display:flex;
    justify-content:flex-end;
    margin-top:20px;
    gap:12px;
  }
  button{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    border:none;
    border-radius:4px;
    padding:13px 24px;
    cursor:pointer;
    transition:.12s;
    min-height:48px;
  }
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{background:#0f1522;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
  .btn-ghost:hover{border-color:var(--ink-soft);color:var(--ink);}

  /* Order summary */
  .summary-box{
    background:#FAF8F3;
    border:1.5px dashed var(--line);
    border-radius:6px;
    padding:14px 18px;
    margin-bottom:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px 22px;
  }
  .summary-box .s-item{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    color:var(--ink);
  }
  .summary-box .s-item b{
    font-family:'Space Grotesk',sans-serif;
    color:var(--red);
    font-size:16px;
  }
  .summary-empty{font-size:14px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}

  /* Manifest table */
  .manifest-empty{
    text-align:center;
    padding:44px 20px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    border:1.5px dashed var(--line);
    border-radius:6px;
  }
  .table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;min-width:640px;border-collapse:collapse;}
  thead th{
    text-align:left;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--ink-soft);
    padding:10px 12px;
    border-bottom:2px solid var(--ink);
  }
  tbody tr{border-bottom:1px dashed var(--line);}
  tbody tr:last-child{border-bottom:none;}
  tbody td{
    padding:14px 12px;
    font-size:15px;
    vertical-align:top;
  }
  .num-cell{
    font-family:'IBM Plex Mono',monospace;
    color:var(--ink-soft);
    font-size:14px;
  }
  .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:#fff;
    padding:3px 8px;
    border-radius:3px;
    display:inline-block;
  }
  .ref{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .addr{color:var(--ink-soft);font-size:13.5px;}
  .postal-cell{font-family:'IBM Plex Mono',monospace;font-size:14px;}
  .row-actions{display:flex;gap:6px;align-items:center;white-space:nowrap;}
  .icon-btn{
    background:none;
    border:1.5px solid transparent;
    cursor:pointer;
    padding:6px;
    border-radius:5px;
    min-height:auto;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:0;
    transition:.12s;
  }
  .icon-btn svg{width:18px;height:18px;display:block;}
  .edit-row{color:var(--edit-blue);}
  .edit-row:hover{background:var(--focus-bg);border-color:var(--edit-blue);}
  .rm{color:var(--red);}
  .rm:hover{background:var(--error-bg);border-color:var(--red);}

  @keyframes flashGreenRow{
    0%   { background:rgba(47,107,79,0.28); }
    100% { background:transparent; }
  }
  tbody tr.row-flash-success{
    animation:flashGreenRow 1.6s ease-out;
  }

  .stamp-btn{
    background:var(--red);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.5px;
    padding:22px 56px;
    border-radius:6px;
    box-shadow:0 3px 0 var(--red-dark);
    transition:.12s;
    min-height:auto;
  }
  .stamp-btn:hover{transform:translateY(-1px);box-shadow:0 4px 0 var(--red-dark);}
  .stamp-btn:disabled{background:#CBC5B8;box-shadow:none;cursor:not-allowed;transform:none;}

  .fab-btn{
    position:fixed;
    right:24px;
    bottom:96px;
    z-index:41;
    width:52px;
    height:52px;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--ink);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:22px;
    line-height:1;
    border-radius:50%;
    box-shadow:0 3px 10px rgba(28,37,54,0.3);
    min-height:auto;
    opacity:0;
    transform:translateY(8px);
    pointer-events:none;
    transition:opacity .2s, transform .2s, background .15s;
  }
  .fab-btn.visible{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .fab-btn:hover{background:#0f1522;transform:translateY(-2px);}

  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}

  /* Sticky quick-access bar: stays visible while scrolling through a long manifest */
  .sticky-bar{
    position:fixed;
    left:0; right:0; bottom:0;
    z-index:40;
    display:none;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:14px 24px;
    background:rgba(241,239,234,0.92);
    backdrop-filter:blur(6px);
    border-top:1px solid var(--line);
    box-shadow:0 -4px 16px rgba(28,37,54,0.08);
  }
  .sticky-bar.visible{display:flex;}
  .sticky-bar-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    color:var(--ink-soft);
  }
  .sticky-bar-btn{
    padding:12px 28px;
    font-size:16px;
  }
  @media (max-width:640px){
    .sticky-bar{padding:12px 16px;gap:12px;}
    .sticky-bar-count{display:none;}
    .sticky-bar-btn{flex:1;}
  }

  /* Wide desktop: give the layout a bit more breathing room */
  @media (min-width:1440px){
    body{padding:40px 20px 120px;}
    .wrap{max-width:1160px;}
    h1{font-size:40px;}
  }

  /* Tablet / narrow desktop window: keep two-up grids but let form fields stack
     so labels and inputs don't get squeezed */
  @media (max-width:900px){
    .grid, .settings-grid{grid-template-columns:1fr;}
  }

  @media (max-width:640px){
    body{font-size:16px;}
    .sizes{grid-template-columns:repeat(3,1fr);}
    #dehuPicker{grid-template-columns:repeat(2,1fr);}
    .grid, .settings-grid{grid-template-columns:1fr;}
    h1{font-size:26px;}
    .stamp-btn{width:100%;text-align:center;padding:20px;}
    .card{padding:18px;}
    table{min-width:560px;}
    thead th, tbody td{padding:10px 8px;font-size:13.5px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="brand-eyebrow">Dry Box Dispatch &middot; Singapore</p>
      <h1>Bulk Order Manifest</h1>
    </div>
  </header>

  <div class="card">
    <h2><span class="n">1</span>Select sender</h2>
    <p class="step-label">Person</p>
    <div class="senders" id="personPicker"></div>
    <p class="step-label" style="margin-top:18px;">Address</p>
    <div class="senders" id="addressPicker"></div>
    <div id="newSenderForm" class="settings-grid" style="display:none;margin-top:18px;">
      <div class="field"><label>Pickup name <span class="req">*</span></label><input id="ns_name" placeholder="e.g. Mazlan"></div>
      <div class="field">
        <label>Pickup contact number <span class="req">*</span></label>
        <div class="phone-row">
          <select id="ns_code" class="code-select"></select>
          <input id="ns_contact" placeholder="e.g. 88977830">
        </div>
      </div>
      <div class="field"><label>Pickup postal code <span class="req">*</span></label><input id="ns_postal" placeholder="e.g. 169204" maxlength="6" inputmode="numeric" pattern="[0-9]{6}"></div>
      <div class="field full" style="grid-column:1/-1;"><label>Pickup address <span class="req">*</span></label><input id="ns_address" placeholder="e.g. 1093 Lower Delta Rd #04-01"></div>
    </div>
    <div class="addbar">
      <button class="btn-ghost" id="addAddressBtn" type="button" style="display:none;">+ Add address for this person</button>
      <button class="btn-ghost" id="toggleSenderFormBtn" type="button">+ Add new person</button>
      <button class="btn-primary" id="saveSenderBtn" type="button" style="display:none;">Save</button>
    </div>
  </div>

  <div class="card" id="productCard">
    <h2><span class="n">2</span>Product</h2>
    <div class="category-tabs" id="categoryTabs">
      <button type="button" class="cat-btn active" data-cat="drybox">Dry Box</button>
      <button type="button" class="cat-btn" data-cat="dehumidifier">Dehumidifier</button>
    </div>
    <div class="sizes" id="sizePicker"></div>
    <div class="sizes" id="dehuPicker" style="display:none;"></div>
  </div>

  <div class="card">
    <h2><span class="n">3</span>Receiver details</h2>
    <div class="paste-box">
      <label for="r_paste">Paste customer message <span class="paste-hint">— paste their name, address, postal code and phone number, and we'll sort it into the fields below</span></label>
      <textarea id="r_paste" placeholder="e.g.
Jo *
1 Sembawang Crescent - Skypark Residences, #02-03
Singapore 757093
+65 9751 7222"></textarea>
      <div class="addbar">
        <button class="btn-primary" id="parsePasteBtn" type="button">Sort into fields</button>
      </div>
    </div>
    <div class="grid">
      <div class="field full"><label>Reference number <span class="req">*</span></label><input id="r_ref" placeholder="e.g. 18L-DBSG20260713145042"></div>
      <div class="field"><label>Receiver name <span class="req">*</span></label><input id="r_name" placeholder="e.g. Henry Tan"></div>
      <div class="field">
        <label>Receiver contact number <span class="req">*</span></label>
        <div class="phone-row">
          <select id="r_code" class="code-select"></select>
          <input id="r_contact" placeholder="e.g. 96518964">
        </div>
      </div>
      <div class="field"><label>Receiver postal code <span class="req">*</span></label><input id="r_postal" placeholder="e.g. 670614" maxlength="6" inputmode="numeric" pattern="[0-9]{6}"></div>
      <div class="field"><label>Item quantity</label><input id="r_qty" type="number" min="1" value="1"></div>
      <div class="field full"><label>Receiver address <span class="req">*</span></label><textarea id="r_address" placeholder="Block, street, unit number"></textarea></div>
    </div>
    <div class="addbar">
      <button class="btn-ghost" id="clearBtn" type="button">Clear fields</button>
      <button class="btn-primary" id="addBtn" type="button">Add order to manifest</button>
    </div>
  </div>

  <div class="card" id="manifestCard">
    <h2><span class="n">4</span>Manifest</h2>
    <div id="summaryArea"></div>
    <div id="manifestArea"><div class="manifest-empty">No orders added yet — pick a size and add your first order above.</div></div>
  </div>

</div>

<button id="fabAddProduct" class="fab-btn" type="button" title="Jump back up to add another product">↑</button>

<div class="sticky-bar" id="stickyBar">
  <span class="sticky-bar-count" id="stickyBarCount">0 orders queued</span>
  <button class="stamp-btn sticky-bar-btn" id="downloadBtnSticky" disabled>Download Excel ↓</button>
</div>

<script>
const PRODUCTS = {
  '9L':  {length:29.5, width:23.5, height:22.5, weight:2.75, value:45.0,   desc:'\n9L Portable Dry Box (Inner bag and moisture card included)'},
  '18L': {length:32,   width:30,   height:35,   weight:3.65, value:75.0,   desc:'18L Dry Cabinet Box'},
  '30L': {length:35,   width:38,   height:50,   weight:7.9,  value:91.99,  desc:'30L Dry Cabinet Box'},
  '38L': {length:35,   width:38,   height:56,   weight:8.9,  value:125.0,  desc:'38L Dry Cabinet Box'},
  '55L': {length:38,   width:37.5, height:68.5, weight:11.66,value:216.52, desc:'55L Dry Cabinet Box'},
};
const HEADERS = ['Service Type','Receiver Country','Receiver Province','Receiver City','Receiver State',
  'Reference Number','COD','Pickup Name','Pickup Contact Number','Pickup Postal Code','Pickup Address',
  'Pickup Instructions','Receiver Name','Receiver Contact Number','Receiver Postal Code','Receiver Address',
  'Recipient mailbox','Delivery Instructions','Length (cm)','Width (cm)','Height (cm)','Weight (kg)',
  'Item Value','Item Description','Item Quantity','Item Unit','Insure Amount'];

const COUNTRY_CODES = [
  {code:'+65', label:'🇸🇬 +65'},
  {code:'+60', label:'🇲🇾 +60'},
  {code:'+62', label:'🇮🇩 +62'},
  {code:'+86', label:'🇨🇳 +86'},
  {code:'+91', label:'🇮🇳 +91'},
  {code:'+1',  label:'🇺🇸 +1'},
  {code:'+44', label:'🇬🇧 +44'},
];
function populateCodeSelect(sel, defaultCode){
  sel.innerHTML = COUNTRY_CODES.map(c => `<option value="${c.code}">${c.label}</option>`).join('');
  sel.value = defaultCode || '+65';
}
function isValidPostal(v){ return /^[0-9]{6}$/.test(v); }

// One color for all Dry Box labels, a different color for all Dehumidifier labels
const DRYBOX_COLOR = '#B5651D';
const DEHU_COLOR = '#1D5FA8';

// Strip whitespace automatically from contact number fields (typed or pasted)
function stripSpacesOnInput(el){
  el.addEventListener('input', () => {
    const cleaned = el.value.replace(/\s+/g, '');
    if(cleaned !== el.value) el.value = cleaned;
  });
}

// Highlight a required field red when it's left empty; clear the highlight once filled in
function attachRequiredValidation(ids){
  ids.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('blur', () => {
      if(!el.value.trim()) el.classList.add('input-error');
    });
    el.addEventListener('input', () => {
      if(el.value.trim()) el.classList.remove('input-error');
    });
  });
}

// Checks required fields on submit attempt; marks empty ones red and focuses the first
function triggerBlink(el){
  el.classList.remove('input-blink');
  void el.offsetWidth; // force reflow so the animation restarts even if it just ran
  el.classList.add('input-blink');
}

function triggerCardBlink(el){
  el.classList.remove('card-blink');
  void el.offsetWidth;
  el.classList.add('card-blink');
}

function validateRequired(ids){
  let firstInvalid = null;
  ids.forEach(id => {
    const el = document.getElementById(id);
    if(!el.value.trim()){
      el.classList.add('input-error');
      if(!firstInvalid) firstInvalid = el;
    } else {
      el.classList.remove('input-error');
    }
  });
  if(firstInvalid){
    firstInvalid.scrollIntoView({behavior:'smooth', block:'center'});
    firstInvalid.focus();
    triggerBlink(firstInvalid);
  }
  return !firstInvalid;
}

function clearFieldErrors(ids){
  ids.forEach(id => document.getElementById(id).classList.remove('input-error'));
}

// Reference number: always uppercase as typed
const refInput = document.getElementById('r_ref');
refInput.addEventListener('input', () => {
  const upper = refInput.value.toUpperCase();
  if(upper !== refInput.value) refInput.value = upper;
});

// Dry box selections auto-prefix the reference number (e.g. "18L-"); dehumidifiers clear it
function setRefPrefix(newPrefix){
  let val = refInput.value;
  if(refPrefix && val.startsWith(refPrefix)){
    val = val.slice(refPrefix.length);
  }
  refInput.value = (newPrefix + val).toUpperCase();
  refPrefix = newPrefix;
}

// Default pickup address per person: Mazlan & JY default to Warehouse (1092), Issac & Huiyi default to Office (1093)
const DEFAULT_ADDRESS_FOR_PERSON = {Mazlan:'Warehouse', JY:'Warehouse', Issac:'Office', Huiyi:'Office'};
function defaultSenderIdxFor(name){
  const wanted = DEFAULT_ADDRESS_FOR_PERSON[name];
  const idx = senders.findIndex(s => s.name === name && addressDisplayLabel(s.address) === wanted);
  return idx !== -1 ? idx : senders.findIndex(s => s.name === name);
}

const personPicker = document.getElementById('personPicker');

function uniquePersonNames(){
  const seen = [];
  senders.forEach(s => { if(!seen.includes(s.name)) seen.push(s.name); });
  return seen;
}

// Display-only label so 1092/1093 read as "Office"/"Warehouse" in the UI.
// The underlying address text (used for the Excel export) is untouched.
function addressDisplayLabel(address){
  if(address.includes('1093')) return 'Office';
  if(address.includes('1092')) return 'Warehouse';
  return address.split(',')[0];
}

function renderSenders(){
  const locked = orders.length > 0;

  // Step 1: person names
  personPicker.innerHTML = '';
  uniquePersonNames().forEach(name => {
    const btn = document.createElement('div');
    const isActive = name === selectedPersonName;
    btn.className = 'sender-btn' + (isActive ? ' active' : '') + (locked && !isActive ? ' locked' : '');
    const personRecord = senders.find(s => s.name === name);
    btn.innerHTML = `<div class="lbl">${name}</div>
      <div class="dims">${personRecord.code} ${personRecord.contact}</div>`;
    btn.addEventListener('click', () => {
      if(locked && !isActive){
        alert('This manifest already has orders under ' + selectedPersonName + '. Every order in one manifest must use the same sender — remove all orders first if you need to switch.');
        return;
      }
      selectedPersonName = name;
      selectedSenderIdx = defaultSenderIdxFor(name);
      renderSenders();
    });
    personPicker.appendChild(btn);
  });

  // Step 2: addresses belonging to the selected person
  addressPicker.innerHTML = '';
  senders.forEach((s, idx) => {
    if(s.name !== selectedPersonName) return;
    const btn = document.createElement('div');
    const isActive = idx === selectedSenderIdx;
    btn.className = 'sender-btn' + (isActive ? ' active' : '') + (locked && !isActive ? ' locked' : '');
    btn.innerHTML = `<button type="button" class="sender-edit" title="Edit address" data-idx="${idx}">Edit</button>
      <div class="lbl">${addressDisplayLabel(s.address)}</div>
      <div class="dims">${s.address}<br>${s.postal}, ${s.country}</div>`;
    btn.addEventListener('click', (e) => {
      if(e.target.closest('.sender-edit')) return;
      if(locked && !isActive){
        alert("This manifest already has orders under this sender's address. Every order in one manifest must use the same sender — remove all orders first if you need to switch.");
        return;
      }
      selectedSenderIdx = idx;
      renderSenders();
    });
    btn.querySelector('.sender-edit').addEventListener('click', (e) => {
      e.stopPropagation();
      openSenderEditForm(idx);
    });
    addressPicker.appendChild(btn);
  });

  const addAddressBtn = document.getElementById('addAddressBtn');
  addAddressBtn.style.display = editingSenderIdx === null ? 'inline-block' : 'none';
  addAddressBtn.textContent = `+ Add address for ${selectedPersonName}`;
}

  if(!validateRequired(['ns_name','ns_contact','ns_postal','ns_address'])){

  const name = document.getElementById('ns_name').value.trim();
  const code = document.getElementById('ns_code').value;

  const postal = document.getElementById('ns_postal').value.trim();

    alert('Postal code must be exactly 6 digits.');

    senders.push({name, code, contact, postal, address, country});

  resetSenderForm();

// ---- Paste & auto-sort customer details ----
function parseCustomerPaste(text){
  // Split on both newlines AND commas so this handles multi-line pastes
  // ("Jo\nAddress\nSingapore 123456\n+65...") as well as single-line,
  // comma-separated pastes ("Name, Address, Singapore 123456, +65...").
  const rawLines = text.split(/\r?\n/)
    .flatMap(line => line.split(','))
    .map(l => l.trim())
    .filter(Boolean);
  if(!rawLines.length) return null;

  // Postal code: an isolated 6-digit number (Singapore postal codes are always 6 digits)
  let postal = '';
  let postalLineIdx = -1;
  rawLines.forEach((line, idx) => {
    if(postal) return;
    const m = line.match(/\b\d{6}\b/);
    if(m){ postal = m[0]; postalLineIdx = idx; }
  });

  // Phone number: a segment made up ONLY of phone-like characters (digits, +, -, (), spaces)
  // — this avoids mistaking an address segment that happens to contain several digits for a phone number.
  let phoneCode = '+65';
  let phoneNumber = '';
  let phoneLineIdx = -1;
  rawLines.forEach((line, idx) => {
    if(phoneNumber || idx === postalLineIdx) return;
    const looksLikePhone = /^[+()\-\s\d]+$/.test(line);
    const digits = line.replace(/\D/g, '');
    if(looksLikePhone && digits.length >= 7 && digits.length <= 15){
      phoneLineIdx = idx;
      // Singapore local numbers are 8 digits. If there's a "+", or the digit count
      // is longer than a bare local number, try to match a known country code prefix
      // (e.g. "6588978126" -> +65, 88978126). A plain 8-digit run is left as-is so a
      // normal local number never gets mistaken for one with an embedded code.
      if(line.includes('+') || digits.length !== 8){
        const sortedCodes = [...COUNTRY_CODES].sort((a, b) => b.code.length - a.code.length);
        const matchedCode = sortedCodes.find(c => digits.startsWith(c.code.slice(1)));
        if(matchedCode){
          phoneCode = matchedCode.code;
          phoneNumber = digits.slice(matchedCode.code.length - 1);
        } else if(line.includes('+')){
          phoneCode = '+' + digits.slice(0, 2);
          phoneNumber = digits.slice(2);
        } else {
          phoneNumber = digits;
        }
      } else {
        phoneNumber = digits;
      }
    }
  });

  // Name: first remaining segment, with trailing markers like "*" trimmed off
  const nameLineIdx = rawLines.findIndex((line, idx) => idx !== postalLineIdx && idx !== phoneLineIdx);
  const name = nameLineIdx !== -1 ? rawLines[nameLineIdx].replace(/[\*\s]+$/, '').trim() : '';

  // Address: whatever segments are left over, rejoined
  let addressLines = rawLines.filter((line, idx) => idx !== nameLineIdx && idx !== postalLineIdx && idx !== phoneLineIdx);
  if(postalLineIdx !== -1){
    const leftover = rawLines[postalLineIdx].replace(/singapore/i, '').replace(postal, '').replace(/[,\s]+$/, '').trim();
    if(leftover) addressLines.push(leftover);
  }
  // Drop bare "Singapore" segments (redundant on its own — country is implied) and
  // de-duplicate repeated segments — common artifacts when an address is copied from a form.
  addressLines = addressLines.filter(l => l.toLowerCase() !== 'singapore');
  const seenSegments = new Set();
  addressLines = addressLines.filter(l => {
    const key = l.toLowerCase();
    if(seenSegments.has(key)) return false;
    seenSegments.add(key);
    return true;
  });
  const address = addressLines.join(', ');

  return { name, address, postal, phoneCode, phoneNumber };
}

function setParsedFieldValue(id, value){
  const el = document.getElementById(id);
  el.value = value;
  el.classList.remove('input-error');
  el.dispatchEvent(new Event('input'));
}

function runPasteParse(){
  const pasteEl = document.getElementById('r_paste');
  const parsed = parseCustomerPaste(pasteEl.value);
  if(!parsed || (!parsed.name && !parsed.address && !parsed.postal && !parsed.phoneNumber)){
    alert("Couldn't find enough details in that paste — please check the fields below manually.");
    pasteEl.scrollIntoView({behavior:'smooth', block:'center'});
    pasteEl.classList.add('input-error');
    return;
  }
  pasteEl.classList.remove('input-error');
  if(parsed.name) setParsedFieldValue('r_name', parsed.name);
  if(parsed.phoneNumber){
    document.getElementById('r_code').value = COUNTRY_CODES.some(c => c.code === parsed.phoneCode) ? parsed.phoneCode : '+65';
    setParsedFieldValue('r_contact', parsed.phoneNumber);
  }
  if(parsed.postal) setParsedFieldValue('r_postal', parsed.postal);
  if(parsed.address) setParsedFieldValue('r_address', parsed.address);

  // Anything the paste couldn't fill in? Flag it red and jump straight to it.
  const stillMissing = ['r_name','r_contact','r_postal','r_address'].filter(id => !document.getElementById(id).value.trim());
  if(stillMissing.length){
    stillMissing.forEach(id => document.getElementById(id).classList.add('input-error'));
    document.getElementById(stillMissing[0]).scrollIntoView({behavior:'smooth', block:'center'});
    document.getElementById(stillMissing[0]).focus();
    triggerBlink(document.getElementById(stillMissing[0]));
  }
}

document.getElementById('parsePasteBtn').addEventListener('click', runPasteParse);

});

document.getElementById('addBtn').addEventListener('click', () => {
  // Validate the text fields first so a missing field always gets scrolled to and
  // highlighted, even if a product hasn't been picked yet.
  if(!validateRequired(['r_ref','r_name','r_contact','r_postal','r_address'])){
    return;
  }

  let productData;
  if(selectedCategory === 'drybox'){
    if(!selectedSize){
      document.getElementById('productCard').scrollIntoView({behavior:'smooth', block:'center'});
      triggerCardBlink(document.getElementById('productCard'));
      alert('Pick a box size first.');
      return;
    }
    productData = { label: selectedSize, ...PRODUCTS[selectedSize] };
  } else {
    if(!selectedDehuVariant){
      document.getElementById('productCard').scrollIntoView({behavior:'smooth', block:'center'});
      triggerCardBlink(document.getElementById('productCard'));
      alert('Pick a dehumidifier variant first.');
      return;
    }
    const variant = selectedDehuVariant;
    productData = { label: variant.name, length: variant.box.length, width: variant.box.width, height: variant.box.height,
      weight: variant.weight, value: variant.value, desc: variant.name };
  }

  const ref = document.getElementById('r_ref').value.trim();
  const name = document.getElementById('r_name').value.trim();
  const code = document.getElementById('r_code').value;
  const contact = document.getElementById('r_contact').value.trim();
  const postal = document.getElementById('r_postal').value.trim();
  const address = document.getElementById('r_address').value.trim();
  if(!isValidPostal(postal)){
    document.getElementById('r_postal').classList.add('input-error');
    document.getElementById('r_postal').scrollIntoView({behavior:'smooth', block:'center'});
    triggerBlink(document.getElementById('r_postal'));
    alert('Receiver postal code must be exactly 6 digits.');
    return;
  }
  const order = {
    size: productData.label,
    ref,
    senderIdx: selectedSenderIdx,
    cod: '0.00',
    name, code, contact, postal, address,
    mailbox: '',
    instr: '',
    qty: parseInt(document.getElementById('r_qty').value) || 1,
    insure: '',
    length: productData.length, width: productData.width, height: productData.height,
    weight: productData.weight, value: productData.value, desc: productData.desc
  };
  if(editingOrderIdx !== null){
    orders[editingOrderIdx] = order;
  } else {
    orders.push(order);
  }
  const finalIdx = editingOrderIdx !== null ? editingOrderIdx : orders.length - 1;
  document.getElementById('clearBtn').click();
  renderManifest();
  highlightAddedRow(finalIdx);
});

function highlightAddedRow(idx){
  const rows = document.querySelectorAll('#manifestArea tbody tr');
  const row = rows[idx];
  if(!row) return;
  row.scrollIntoView({behavior:'smooth', block:'center'});
  row.classList.remove('row-flash-success');
  void row.offsetWidth; // restart animation if it just played
  row.classList.add('row-flash-success');
  setTimeout(() => row.classList.remove('row-flash-success'), 1700);
}

function editOrder(idx){
  const o = orders[idx];
  editingOrderIdx = idx;
  document.getElementById('r_ref').value = o.ref;
  document.getElementById('r_name').value = o.name;
  document.getElementById('r_code').value = o.code;
  document.getElementById('r_contact').value = o.contact;
  document.getElementById('r_postal').value = o.postal;
  document.getElementById('r_address').value = o.address;
  document.getElementById('r_qty').value = o.qty;
  clearFieldErrors(['r_ref','r_name','r_contact','r_postal','r_address']);
  selectedSenderIdx = o.senderIdx;
  selectedPersonName = (senders[o.senderIdx] || senders[0]).name;
  renderSenders();

  // Try to reselect matching product size/variant
  if(PRODUCTS[o.size]){
    selectedCategory = 'drybox';
    selectedSize = o.size;
    refPrefix = o.size.toUpperCase() + '-';
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat==='drybox'));
    document.getElementById('sizePicker').style.display = 'grid';
    document.getElementById('dehuPicker').style.display = 'none';
    document.querySelectorAll('#sizePicker .size-btn').forEach(b=>b.classList.toggle('active', b.dataset.size===o.size));
  } else {
    selectedCategory = 'dehumidifier';
    const variant = DEHU_VARIANTS.find(v => v.name === o.size);
    if(variant){
      selectedDehuVariant = variant;
      refPrefix = variant.refillCount ? `1CG${variant.refillCount}RF-` : `RF${o.qty}-`;
    }
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat==='dehumidifier'));
    document.getElementById('sizePicker').style.display = 'none';
    document.getElementById('dehuPicker').style.display = 'grid';
    document.querySelectorAll('#dehuPicker .size-btn').forEach(b=>b.classList.toggle('active', b.dataset.variant===o.size));
  }

  document.getElementById('addBtn').textContent = 'Update order';
  document.querySelector('.card:nth-of-type(3)').scrollIntoView({behavior:'smooth', block:'start'});
}

function removeOrder(idx){
  orders.splice(idx,1);
  if(editingOrderIdx === idx){
    document.getElementById('clearBtn').click();
  } else if(editingOrderIdx !== null && idx < editingOrderIdx){
    editingOrderIdx -= 1;
  }
  renderManifest();
}

function renderSummary(){
  const area = document.getElementById('summaryArea');
  if(orders.length === 0){
    area.innerHTML = '';
    return;
  }
  const counts = {};
  orders.forEach(o => {
    counts[o.size] = (counts[o.size] || 0) + o.qty;
  });
  const items = Object.keys(counts).map(size =>
    `<span class="s-item"><b>${counts[size]}</b> × ${size}</span>`
  ).join('');
  area.innerHTML = `<div class="summary-box">${items}</div>`;
}

function renderManifest(){
  const area = document.getElementById('manifestArea');

  const stickyBar = document.getElementById('stickyBar');
  document.getElementById('downloadBtnSticky').disabled = orders.length === 0;
  document.getElementById('stickyBarCount').textContent = orders.length === 1 ? '1 order queued' : `${orders.length} orders queued`;
  stickyBar.classList.toggle('visible', orders.length > 0);

  renderSummary();
  renderSenders();
  if(orders.length === 0){
    area.innerHTML = '<div class="manifest-empty">No orders added yet — pick a size and add your first order above.</div>';
    return;
  }
  let rows = orders.map((o,i)=>`
    <tr>
      <td class="num-cell">${i+1}</td>
      <td><span class="tag">${o.size}</span></td>
      <td>
        <div>${o.name}</div>
        <div class="ref">${o.ref}</div>
      </td>
      <td>${o.code} ${o.contact}</td>
      <td class="postal-cell">${o.postal}</td>
      <td class="addr">${o.address}${o.mailbox ? ' · '+o.mailbox : ''}</td>
      <td>
        <div class="row-actions">
          <button class="icon-btn edit-row" onclick="editOrder(${i})" title="Edit" aria-label="Edit order">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
          <button class="icon-btn rm" onclick="removeOrder(${i})" title="Delete" aria-label="Delete order">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      </td>
    </tr>`).join('');
  area.innerHTML = `<div class="table-scroll"><table>
    <thead><tr><th>#</th><th>Size</th><th>Receiver</th><th>Phone</th><th>Postal Code</th><th>Address</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// Warn before an accidental refresh or tab close wipes queued orders or
// anything the person has already started typing but not added yet.
function hasUnsavedWork(){
  if(orders.length > 0) return true;
  const formIds = ['r_ref','r_name','r_contact','r_postal','r_address'];
  return formIds.some(id => document.getElementById(id).value.trim() !== '');
}
window.addEventListener('beforeunload', (e) => {
  if(hasUnsavedWork()){
    e.preventDefault();
    e.returnValue = '';
  }
});

function performDownload(){
  const data = orders.map(o => {
    const s = senders[o.senderIdx] || senders[0];
    return [
      o.size, s.country, s.country, s.country, s.country,
      o.ref, o.cod, s.name, `${s.code} ${s.contact}`, s.postal, s.address,
      '', o.name, `${o.code} ${o.contact}`, o.postal, o.address,
      o.mailbox, o.instr, o.length, o.width, o.height, o.weight,
      o.value, o.desc, o.qty, '件', o.insure
    ];
  });

  const ws = XLSX.utils.aoa_to_sheet([HEADERS, ...data]);
  ws['!cols'] = HEADERS.map(h => ({wch: Math.max(12, h.length+2)}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Upload Ready');

  XLSX.writeFile(wb, 'singapore_delivery_order_en.xlsx');
}
document.getElementById('downloadBtnSticky').addEventListener('click', performDownload);

document.getElementById('fabAddProduct').addEventListener('click', () => {
  document.getElementById('productCard').scrollIntoView({behavior:'smooth', block:'start'});
});

// Only show the "jump to product" FAB once the Product section has scrolled out of view
const fabBtn = document.getElementById('fabAddProduct');
const productCardEl = document.getElementById('productCard');
function updateFabVisibility(){
  const rect = productCardEl.getBoundingClientRect();
  const scrolledPast = rect.bottom < 0;
  fabBtn.classList.toggle('visible', scrolledPast);
}
window.addEventListener('scroll', updateFabVisibility, {passive:true});
updateFabVisibility();
</script>
</body>
</html>
